<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediccon LIS - Laboratory Information System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="global.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            cursor: default;
            user-select: none;
        }

        /* Allow text selection in inputs and editable areas */
        input,
        textarea,
        [contenteditable="true"] {
            user-select: text;
            cursor: text;
        }

        /* Proper cursor for buttons and clickable elements */
        button,
        a,
        [role="button"],
        .cursor-pointer {
            cursor: pointer !important;
        }

        /* Disabled elements */
        button:disabled,
        input:disabled {
            cursor: not-allowed !important;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Outfit', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-slate-50 overflow-hidden">
    <div id="root" class="h-screen w-screen"></div>
    <script>
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            console.error("GLOBAL_ERROR:", msg, error);
            document.body.innerHTML = `
                <div style="color:#991b1b; background:#fef2f2; padding:40px; font-family:system-ui; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
                    <div style="background:#fee2e2; padding:20px; border-radius:20px; border: 2px solid #fecaca; max-width: 600px;">
                        <h1 style="margin-top:0;">System Initialization Error</h1>
                        <p style="font-weight: 500;">Mediccon LIS encountered a critical error during startup.</p>
                        <div style="background:#fff; padding:15px; border-radius:10px; text-align:left; font-family:monospace; font-size:12px; margin-top:20px; border: 1px solid #fecaca; overflow:auto; max-height:300px;">
                            <b>Message:</b> ${msg}<br><br>
                            <b>Stack:</b><br>${error ? error.stack : 'No stack trace available'}
                        </div>
                        <button onclick="window.location.reload()" style="margin-top:20px; padding:10px 20px; background:#ef4444; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Restart Application</button>
                    </div>
                </div>`;
            return false;
        };


        try {
            console.log("RENDERER_BOOT: Initializing...");
            const path = require('path');
            const fs = require('fs');
            // Resolve the entry point relative to current directory
            const indexPath = path.resolve(__dirname, 'dist', 'index.js');

            if (!fs.existsSync(indexPath)) {
                throw new Error("Application bundle not found at: " + indexPath + ". Please run 'node compiler.js' first.");
            }

            require(indexPath);
            console.log("RENDERER_BOOT: Application Loaded");
        } catch (e) {
            window.onerror(e.message, 'index.html', 0, 0, e);
        }
    </script>
</body>

</html>
